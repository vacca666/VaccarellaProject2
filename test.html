<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons with Sounds</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <!-- Ask the user how they feel -->
  <input id="mood" type="text" placeholder="Type a last name..." />
  <button onclick="writePoem()" >
    Speak
  </button>

  <!-- The poem appears here -->
  <div id="poem"></div>


<br>
<button onClick="playAudio1();">Painting Noises</button>


<br>

<button onClick="playAudio2();">Walking</button>

<button onclick="playAudio3();">Some Ambiance</button>

<script>

  var audio1 = new Audio('audio1.mp3')


  function playAudio1()
  {
    audio1.play();
  }

 var audio2 = new Audio('audio2.mp3')


  function playAudio2()
  {
    audio2.play();
  }


  var audio3 = new Audio('audio3.mp3')
  function playAudio3()
  {
    audio3.play();
  }


      function writePoem() {

      let feeling = document.getElementById("mood").value.toLowerCase();

      let poemBox = document.getElementById("poem");

      if (feeling === "da vinci") {
        poemBox.textContent = "Innovative.";

      } else if (feeling === "van gogh") {
        poemBox.textContent = "Beautiful work and beautiful soul.";

      } else if (feeling === "michelangelo") {
        poemBox.textContent = "COOL.";

      } else if (feeling === "picasso") {
        poemBox.textContent = "TERRIBLE person. Love the blue era.";

      } else if (feeling === "pollock") {
        poemBox.textContent = "POO.";

      } else if (feeling === "monet") {
        poemBox.textContent = "BEAUTIFUL.";

       } else if (feeling === "manet") {
        poemBox.textContent = "AWESOME.";

       } else if (feeling === "kahlo") {
        poemBox.textContent = "Not fully formed on an opinion.";

       } else if (feeling === "caravaggio") {
        poemBox.textContent = "AMAZING.";




      } else {
        poemBox.textContent = " not enough knowledge :(";
      }

    }






</script>

</body>
</html>
